# Luna Tracker — CI
# After you create the GitHub repository, push this repo; Actions run on push/PR to main.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: |
          set -e
          if [ ! -f package.json ]; then
            echo "Add package.json at the repository root (or change this step to match your app layout)."
            exit 1
          fi
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "No package-lock.json — using npm install. Commit a lockfile for reproducible CI."
            npm install
          fi

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Unit tests
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present
